<!-- Эпичная 3D-анимация для профиля -->
<div align="center">
  <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 600' width='100%' height='auto'><style>@keyframes spinCube { 0% { transform: rotateX(-20deg) rotateY(0deg); } 100% { transform: rotateX(-20deg) rotateY(360deg); } } @keyframes spinRing1 { 0% { transform: rotateX(90deg) rotateZ(0deg); } 100% { transform: rotateX(90deg) rotateZ(360deg); } } @keyframes spinRing2 { 0% { transform: rotateY(90deg) rotateX(0deg); } 100% { transform: rotateY(90deg) rotateX(360deg); } } @keyframes floatText { 0% { transform: translateY(0px) rotateY(0deg); } 50% { transform: translateY(-20px) rotateY(180deg); } 100% { transform: translateY(0px) rotateY(360deg); } } @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } } .scene { perspective: 800px; } .cube-group { animation: spinCube 12s linear infinite; transform-origin: 400px 300px; } .ring1 { animation: spinRing1 8s linear infinite; transform-origin: 400px 300px; } .ring2 { animation: spinRing2 10s linear infinite; transform-origin: 400px 300px; } .text { animation: floatText 6s ease-in-out infinite; transform-origin: 400px 300px; } .star { animation: twinkle 2s ease-in-out infinite; }</style><rect width='800' height='600' fill='#0a0a2a'/><g class='star'><circle cx='50' cy='50' r='2' fill='white'/><circle cx='150' cy='80' r='1.5' fill='white'/><circle cx='250' cy='30' r='2' fill='white'/><circle cx='350' cy='70' r='1' fill='white'/><circle cx='450' cy='40' r='2.5' fill='white'/><circle cx='550' cy='90' r='1.5' fill='white'/><circle cx='650' cy='20' r='2' fill='white'/><circle cx='750' cy='60' r='1' fill='white'/><circle cx='100' cy='550' r='2' fill='white'/><circle cx='200' cy='520' r='1.5' fill='white'/><circle cx='300' cy='560' r='2' fill='white'/><circle cx='500' cy='540' r='1' fill='white'/><circle cx='600' cy='570' r='2.5' fill='white'/><circle cx='700' cy='530' r='1.5' fill='white'/></g><g class='scene'><g class='cube-group'><polygon points='300,200 500,200 500,400 300,400' fill='rgba(0,150,255,0.3)' stroke='#00aaff' stroke-width='2'/><polygon points='500,200 700,150 700,350 500,400' fill='rgba(255,0,150,0.3)' stroke='#ff00aa' stroke-width='2'/><polygon points='700,150 900,200 900,400 700,350' fill='rgba(0,255,200,0.3)' stroke='#00ffcc' stroke-width='2'/><polygon points='300,200 500,150 700,150 500,200' fill='rgba(255,200,0,0.3)' stroke='#ffcc00' stroke-width='2'/><polygon points='300,400 500,350 700,350 500,400' fill='rgba(200,0,255,0.3)' stroke='#cc00ff' stroke-width='2'/><polygon points='300,200 500,150 500,350 300,400' fill='rgba(255,100,0,0.3)' stroke='#ff6600' stroke-width='2'/></g><g class='ring1'><circle cx='400' cy='300' r='180' fill='none' stroke='#ffaa00' stroke-width='2' stroke-dasharray='10 20' opacity='0.6'/><circle cx='400' cy='300' r='200' fill='none' stroke='#00ffaa' stroke-width='1.5' stroke-dasharray='5 15' opacity='0.4'/><circle cx='400' cy='300' r='220' fill='none' stroke='#aa00ff' stroke-width='1' stroke-dasharray='2 8' opacity='0.3'/></g><g class='ring2'><circle cx='400' cy='300' r='160' fill='none' stroke='#ff44aa' stroke-width='2' stroke-dasharray='8 12' opacity='0.5'/><circle cx='400' cy='300' r='190' fill='none' stroke='#44ffaa' stroke-width='1.5' stroke-dasharray='4 10' opacity='0.4'/><circle cx='400' cy='300' r='210' fill='none' stroke='#aa44ff' stroke-width='1' stroke-dasharray='3 7' opacity='0.3'/></g><g class='text'><text x='400' y='320' font-family='Arial, sans-serif' font-size='60' fill='white' text-anchor='middle' dominant-baseline='middle' filter='url(#glow)'>ZRinca</text><text x='400' y='340' font-family='Arial, sans-serif' font-size='20' fill='#88ccff' text-anchor='middle' dominant-baseline='middle' opacity='0.8'>Full Stack Developer</text></g></g><defs><filter id='glow'><feGaussianBlur stdDeviation='3' result='coloredBlur'/><feMerge><feMergeNode in='coloredBlur'/><feMergeNode in='SourceGraphic'/></feMerge></filter></defs></svg>" alt="3D Epic Animation" />
</div>
